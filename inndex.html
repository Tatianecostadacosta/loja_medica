<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Loja Médica</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🩺 Loja de Equipamentos Médicos</h1>
</header>

<div class="produtos">

    <div class="card">
        <h3>Termômetro Digital</h3>
        <p>R$ 50</p>
        <button onclick="adicionar('Termômetro', 50)">Comprar</button>
    </div>

    <div class="card">
        <h3>Aparelho de Pressão</h3>
        <p>R$ 120</p>
        <button onclick="adicionar('Pressão', 120)">Comprar</button>
    </div>

    <div class="card">
        <h3>Oxímetro</h3>
        <p>R$ 80</p>
        <button onclick="adicionar('Oxímetro', 80)">Comprar</button>
    </div>

</div>

<div class="carrinho">
    <h2>Carrinho</h2>
    <ul id="lista"></ul>
    <p>Total: R$ <span id="total">0</span></p>
    <input type="text" id="nomeCliente" placeholder="Seu nome" style="width:100%; padding:8px; margin-top:10px;">

    <button onclick="finalizarCompra()" style="width:100%; margin-top:10px;">
        Finalizar Compra
    </button>

    <button onclick="abrirModal()" style="width:100%; margin-top:5px; background:#b02a37;">
        Limpar Carrinho
    </button>
</div>

<div id="modal" class="modal">
    <div class="modal-box">
        <p><strong>Deseja limpar o carrinho?</strong></p>

        <div class="botoes-modal">
            <button class="btn-sim" onclick="confirmarLimpar()">Sim</button>
            <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
        </div>
    </div>
</div>

<div id="modalErro" class="modal">
    <div class="modal-box">
        <p><strong>Por favor, informe seu nome antes de finalizar!</strong></p>

        <div class="botoes-modal">
            <button class="btn-cancelar" onclick="fecharModalErro()">Ok</button>
        </div>
    </div>
</div>

<!-- Conectando o JS -->
<script src="script.js"></script>

</body>
</html>
